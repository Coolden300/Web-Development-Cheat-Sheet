<!DOCTYPE html>
<html>
    <head>
        <!-- 
        This is where you usually put your link to CSS - in the header. It's best to do so since
        1 - easy to locate, and 2 - it will load CSS before rest of the page. It's not strictly
        required to put it in the header, but recommended.
        -->
        <link rel="stylesheet" href="style.css">
        
        <title>This is a title</title>
    </head>     

    <body>
        <h1>This is a fancy header!</h1>
        <p>This is a fancy paragraph.</p>
    </body>
</html>
